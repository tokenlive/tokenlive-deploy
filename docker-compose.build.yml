version: '3.8'

# ===========================================
# TokenLive 本地构建配置
# ===========================================
# 使用方式:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
# ===========================================

services:
  admin:
    image: "${REGISTRY:-ghcr.io/tokenlive}/tokenlive-admin:${VERSION:-latest}"
    build:
      context: ../tokenlive-admin
      dockerfile: Dockerfile

  gateway:
    image: "${REGISTRY:-ghcr.io/tokenlive}/tokenlive-gateway:${VERSION:-latest}"
    build:
      context: ../tokenlive-gateway
      dockerfile: deploy/build/Dockerfile
      args:
        APP_RELATIVE_PATH: "./cmd/server"
