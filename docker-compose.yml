version: '3.8'

# ===========================================
# TokenLive 一键部署
# ===========================================
# 使用方式:
#   1. 从远程拉取镜像运行: docker compose up -d
#   2. 本地构建镜像运行: docker compose -f docker-compose.yml -f docker-compose.build.yml up -d
#   3. 启用 Redis: docker compose --profile with-redis up -d
#   4. 启用监控: docker compose --profile with-monitoring up -d
# ===========================================

services:
  # Caddy - 统一入口和反向代理
  caddy:
    image: caddy:2-alpine
    container_name: tokenlive-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - admin
      - gateway
    networks:
      - tokenlive

  # Admin Console - 管理后台
  admin:
    image: "${REGISTRY:-ghcr.io/tokenlive}/tokenlive-admin:${VERSION:-latest}"
    container_name: tokenlive-admin
    restart: unless-stopped
    environment:
      - ROOT_PASSWORD=${ADMIN_PASSWORD:-admin}
      - DB_DSN=/data/admin.db
      - STORAGE_CACHE_TYPE=memory
      - PROMETHEUS_SERVER_URL=http://gateway:8000
      - GATEWAY_SYNC_TOKEN=${GATEWAY_SYNC_TOKEN:-default_tokenlive_sync_secret_token_2026}
    volumes:
      - admin-data:/data
    depends_on:
      - gateway
    networks:
      - tokenlive
    labels:
      - "com.tokenlive.group=admin"

  # Gateway - API 网关
  gateway:
    image: "${REGISTRY:-ghcr.io/tokenlive}/tokenlive-gateway:${VERSION:-latest}"
    container_name: tokenlive-gateway
    restart: unless-stopped
    environment:
      - DB_DRIVER=sqlite
      - DB_DSN=/data/gateway.db
      - APP_CONF=/config/default.yml
      - ADMIN_SERVER_URL=http://admin:8040
      - GATEWAY_SYNC_TOKEN=${GATEWAY_SYNC_TOKEN:-default_tokenlive_sync_secret_token_2026}
      - GATEWAY_CONFIG_SOURCE=${GATEWAY_CONFIG_SOURCE:-http}
      - GATEWAY_STATE_STORE=${GATEWAY_STATE_STORE:-memory}
    volumes:
      - gateway-data:/data
      - ./gateway/config:/config:ro
    networks:
      - tokenlive
    labels:
      - "com.tokenlive.group=gateway"

  # Redis (可选 - 用 --profile with-redis 启用)
  redis:
    image: redis:7-alpine
    container_name: tokenlive-redis
    restart: unless-stopped
    profiles:
      - with-redis
    volumes:
      - redis-data:/data
    networks:
      - tokenlive

  # Prometheus (可选 - 用 --profile with-monitoring 启用)
  prometheus:
    image: prom/prometheus:latest
    container_name: tokenlive-prometheus
    restart: unless-stopped
    profiles:
      - with-monitoring
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - tokenlive

  # Grafana (可选 - 用 --profile with-monitoring 启用)
  grafana:
    image: grafana/grafana:latest
    container_name: tokenlive-grafana
    restart: unless-stopped
    profiles:
      - with-monitoring
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - tokenlive

# 数据卷
volumes:
  caddy-data:
  caddy-config:
  admin-data:
  gateway-data:
  redis-data:
  prometheus-data:
  grafana-data:

# 网络配置
networks:
  tokenlive:
    name: tokenlive-network
