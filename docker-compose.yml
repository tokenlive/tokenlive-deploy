# ===========================================
# TokenLive 一键部署
# ===========================================
# 使用方式:
#   1. 从远程拉取镜像运行: docker compose up -d
#   2. 本地构建镜像运行: docker compose -f docker-compose.yml -f docker-compose.build.yml up -d
#   3. 启用 Redis: docker compose --profile with-redis up -d
#   4. 启用监控: docker compose --profile with-monitoring up -d
# ===========================================

services:
  # Caddy - 统一入口和反向代理
  caddy:
    image: caddy:2-alpine
    container_name: tokenlive-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - DOMAIN=${DOMAIN:-http://}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      admin:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tokenlive
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Admin Console - 管理后台
  admin:
    image: "${REGISTRY:-ghcr.io/tokenlive}/tokenlive-admin:${VERSION:-latest}"
    container_name: tokenlive-admin
    restart: unless-stopped
    environment:
      - ROOT_PASSWORD=${ADMIN_PASSWORD:-admin}
      - DB_TYPE=${DB_TYPE:-sqlite3}
      - DB_DSN=${DB_DSN:-/data/admin.db}
      - STORAGE_CACHE_TYPE=memory
      - PROMETHEUS_SERVER_URL=${PROMETHEUS_SERVER_URL:-http://prometheus:9090}
      - GATEWAY_SYNC_TOKEN=${GATEWAY_SYNC_TOKEN:-default_tokenlive_sync_secret_token_2026}
    volumes:
      - admin-data:/data
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8040/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tokenlive
    labels:
      - "com.tokenlive.group=admin"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Gateway - API 网关
  gateway:
    image: "${REGISTRY:-ghcr.io/tokenlive}/tokenlive-gateway:${VERSION:-latest}"
    container_name: tokenlive-gateway
    restart: unless-stopped
    environment:
      - DB_DRIVER=sqlite
      - DB_DSN=/data/gateway.db
      - APP_CONF=/config/default.yml
      - ADMIN_SERVER_URL=http://admin:8040
      - GATEWAY_SYNC_TOKEN=${GATEWAY_SYNC_TOKEN:-default_tokenlive_sync_secret_token_2026}
      - GATEWAY_CONFIG_SOURCE=${GATEWAY_CONFIG_SOURCE:-http}
      - GATEWAY_STATE_STORE=${GATEWAY_STATE_STORE:-memory}
    volumes:
      - gateway-data:/data
      - ./gateway/config:/config:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8000/metrics || wget -q --spider http://127.0.0.1:8000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tokenlive
    labels:
      - "com.tokenlive.group=gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Redis (可选 - 用 --profile with-redis 启用)
  redis:
    image: redis:7-alpine
    container_name: tokenlive-redis
    restart: unless-stopped
    profiles:
      - with-redis
    volumes:
      - redis-data:/data
    networks:
      - tokenlive
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Prometheus (可选 - 用 --profile with-monitoring 启用)
  prometheus:
    image: prom/prometheus:latest
    container_name: tokenlive-prometheus
    restart: unless-stopped
    profiles:
      - with-monitoring
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - tokenlive
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# 数据卷
volumes:
  caddy-data:
  caddy-config:
  admin-data:
  gateway-data:
  redis-data:
  prometheus-data:

# 网络配置
networks:
  tokenlive:
    name: tokenlive-network
